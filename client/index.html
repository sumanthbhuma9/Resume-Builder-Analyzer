<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Prevent Theme Flash/Flicker on Refresh -->
    <script>
      (function() {
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
    
    <!-- SEO Optimization -->
    <title>Resume Builder & Analyzer | Build & Analyze ATS-Optimized Resumes Online</title>
    <meta name="description" content="Build and analyze stunning, recruiter-ready, ATS-compliant resumes with real-time preview, customizable templates, smart parser engine, and analysis controls." />
    <meta name="keywords" content="resume analyzer, resume builder, cv creator, professional resume, online resume maker, ATS friendly cv, portfolio builder" />
    
    <!-- Google Fonts Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
